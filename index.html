<script>
  tailwind.config = {
    theme: {
      extend: {

<style type="text/tailwindcss">
  @layer utilities {
    .animate-fill {
      animation: fill 2.4s ease-out forwards 0.2s;
    }
    .animate-pulse-custom {
      animation: pulse-custom 1.6s ease-in-out infinite;
    }
  }
  @keyframes fill { to { width: 62%; } }
  @keyframes pulse-custom { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  
  @media (prefers-reduced-motion: reduce) {
    .animate-fill, .animate-pulse-custom { animation: none; }
    .animate-fill { width: 62%; }
  }
</style>
